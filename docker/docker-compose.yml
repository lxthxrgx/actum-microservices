services:
  gateway:
    build:
      context: ../src/Gateway
      dockerfile: Dockerfile
    ports:
      - "3000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    depends_on:
      - auth-service

  auth-service:
    build:
      context: ..
      dockerfile: src/Auth/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Production

  postgres:
    build:
      context: .
      dockerfile: Postgres/Dockerfile
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: